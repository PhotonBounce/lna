<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HospicePro AI — Intelligent Hospice Management Platform</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="HospicePro AI - The most advanced AI-powered hospice management platform. Demo environment.">
<meta name="robots" content="noindex, nofollow">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<!-- Sidebar Overlay (mobile) -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

<!-- ===== SIDEBAR ===== -->
<aside class="sidebar" id="sidebar">
 <div class="sidebar-header">
  <div class="logo-icon">🏥</div>
  <div>
   <div class="logo-text">HospicePro AI</div>
   <div class="logo-sub">DEMO ENVIRONMENT</div>
  </div>
 </div>
 <div class="sidebar-nav" id="sidebarNav"></div>
 <div class="sidebar-footer">
  <div class="mode-switch">
   <button class="mode-btn active" id="modeFront" onclick="switchMode('front')">🏥 Hospice</button>
   <button class="mode-btn" id="modeAdmin" onclick="switchMode('admin')">⚙️ Admin</button>
  </div>
 </div>
</aside>

<!-- ===== MAIN CONTENT ===== -->
<div class="main-content">
 <div class="top-bar">
  <div style="display:flex;align-items:center;gap:12px">
   <button class="hamburger" onclick="toggleSidebar()">☰</button>
   <span class="page-title" id="pageTitle">Dashboard</span>
  </div>
  <div class="top-actions">
   <input type="text" class="search-box" id="globalSearch" placeholder="Search anything..." oninput="onGlobalSearch(this.value)">
   <button class="top-btn" onclick="showTrialModal()">🚀 Free Trial</button>
  </div>
 </div>
 <div id="pageContainer"></div>
</div>

<!-- ===== CHATBOT ===== -->
<button class="chatbot-toggle" id="chatToggle" onclick="toggleChat()">
 💬 <span class="notif-dot" id="chatNotif">1</span>
</button>
<div class="chatbot-panel" id="chatPanel">
 <div class="chat-header">
  <div class="chat-header-left">
   <span style="font-size:20px">🤖</span>
   <div>
    <h3 id="chatBotName">HospicePro Assistant</h3>
    <div class="chat-status" id="chatStatus">Online — Ready to help</div>
   </div>
  </div>
  <button class="chat-close" onclick="toggleChat()">✕</button>
 </div>
 <div class="chat-context" id="chatContext">
  <span>👁️</span> <span id="chatContextText">Watching: Dashboard</span>
 </div>
 <div class="chat-messages" id="chatMessages"></div>
 <div class="chat-input-area">
  <input type="text" class="chat-input" id="chatInput" placeholder="Ask me anything about hospice..." onkeydown="if(event.key==='Enter')sendChat()" oninput="onChatTyping(this.value)">
  <button class="chat-send" onclick="sendChat()">➤</button>
 </div>
</div>

<!-- ===== TRIAL MODAL ===== -->
<div class="modal-overlay" id="trialModal" onclick="if(event.target===this)closeTrialModal()">
 <div class="modal-box">
  <h2>Start Your Free Trial</h2>
  <p id="modalPlanText">Experience HospicePro AI risk-free. No credit card required.</p>
  <input type="text" placeholder="Full Name" id="trialName">
  <input type="email" placeholder="Work Email" id="trialEmail">
  <input type="text" placeholder="Agency Name" id="trialAgency">
  <select id="trialPlan">
   <option value="starter">Starter — $199/mo (30-day trial)</option>
   <option value="professional" selected>Professional — $349/mo (30-day trial)</option>
   <option value="enterprise">Enterprise — $599/mo (14-day pilot)</option>
  </select>
  <button class="btn btn-primary" style="width:100%;padding:14px;font-size:16px" onclick="submitTrial()">Begin Free Trial →</button>
  <p class="modal-cancel" onclick="closeTrialModal()">Cancel</p>
 </div>
</div>

<!-- ===== TOAST ===== -->
<div class="toast" id="toast"></div>

<!-- ===== SCRIPTS ===== -->
<script src="js/ml-engine.js"></script>
<script src="js/pages-front.js"></script>
<script src="js/pages-admin.js"></script>
<script src="js/chatbot.js"></script>
<script src="js/app.js"></script>
</body>
</html>
